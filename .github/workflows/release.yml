name: Automate PyPI Release via ReleaseFlow

on:
  push:
    branches:
      - main

jobs:
  validate-and-release:
    name: Build, Scan, and Publish Python distribution to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for OIDC and PyPI Trusted Publishing

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Needed for changelog generation

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine black mypy pip-audit types-requests types-PyYAML types-setuptools

    - name: Code Quality - Black Formatter
      run: black --check .

    - name: Code Quality - Type Safety (Mypy)
      run: mypy .

    - name: Security - Dependency Audit
      run: pip-audit

    # TODO: Insert ReleaseFlow CLI setup and execution here
    # 1. Download/Install `vorsam` CLI (or use an action if it exists)
    # 2. Authenticate to Azure Key Vault if required by release.yaml
    # 3. Run `vorsam release generate` (or rflow)
    # 4. Extract variables (Version, SBOM, Security Scans, Changelog)
    - name: Run ReleaseFlow Generator
      id: rflow
      run: |
        echo "TODO: Implement rflow release generation"
        # Dummy values for testing the workflow logic
        echo "VERSION=1.3.5" >> $GITHUB_ENV
        echo "Release generated" > release-notes.md
        echo "{}" > sbom.json
        echo "{}" > security-scan.json

    - name: Sync Version and Build Package
      run: |
        # Update pyproject.toml dynamically
        sed -i "s/^version = \".*\"/version = \"${{ env.VERSION }}\"/" pyproject.toml
        # Update __init__.py dynamically
        sed -i "s/__version__ = \".*\"/__version__ = \"${{ env.VERSION }}\"/" elastro/__init__.py
        
        # Build wheel and sdist
        python -m build

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: Release v${{ env.VERSION }}
        body_path: release-notes.md
        files: |
          sbom.json
          security-scan.json
          dist/*

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        python -m twine upload dist/*
