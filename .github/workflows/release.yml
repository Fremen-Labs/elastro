name: Automate PyPI Release via ReleaseFlow

on:
  push:
    branches:
      - main

jobs:
  validate-and-release:
    name: Build, Scan, and Publish Python distribution to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for OIDC and PyPI Trusted Publishing

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Needed for changelog generation

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine black mypy pip-audit types-requests types-PyYAML types-setuptools

    - name: Code Quality - Black Formatter
      run: black --check .

    - name: Code Quality - Type Safety (Mypy)
      run: mypy .

    - name: Security - Dependency Audit
      run: pip-audit

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Run ReleaseFlow Generator
      id: rflow
      env:
        RFLOW_ADO_PAT: ${{ secrets.RFLOW_ADO_PAT }}
      run: |
        # 1. Install ReleaseFlow CLI from Azure DevOps
        echo "Fetching ReleaseFlow binary directly from Azure DevOps Artifacts..."
        ORG="mentat-automation"
        PROJECT="vorsam"
        # The ADO Pipeline ID that builds rflow (e.g., release-flow-build-prod)
        # To make this robust without hardcoding the ID, we can fetch the latest successful run of the definition name,
        # but for direct download, we need the Definition ID. Assuming ID=1 for now, or user can update.
        # However, the most bulletproof way to get the latest binary from a private repo without complex ADO artifact APIs 
        # in bash is to compile it on the fly, or if there is a known static URL.
        
        echo "Since we are bypassing the bash install.sh, we will clone the rflow repo and build it locally in the runner to guarantee architecture compatibility."
        
        # We will clone the releaseflow repo using the PAT
        git clone https://$RFLOW_ADO_PAT@dev.azure.com/$ORG/$PROJECT/_git/ReleaseFlow /tmp/ReleaseFlow
        cd /tmp/ReleaseFlow
        
        # Build the rflow binary
        echo "Building rflow from source..."
        make build
        
        # Move to path
        sudo cp bin/rflow /usr/local/bin/rflow
        sudo chmod +x /usr/local/bin/rflow
        
        # Verify
        rflow --version
        
        # Move back to workspace
        cd $GITHUB_WORKSPACE
        
        # 2. Install Dependencies (Syft for SBOM, Trivy for Scans)
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        
        # 3. Bump version and generate manifest
        rflow manifest generate --config release.yaml --app-dir . --bump patch
        
        # Extract the new version written to .version by rflow
        VERSION=$(cat .version)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        
        # Generate SBOM
        rflow sbom generate --manifest manifests/release-manifest.yaml
        
        # Scan for vulnerabilities
        rflow scan images --manifest manifests/release-manifest.yaml
        
        # Generate Release Notes
        # The external notes are generated into the ReleaseFlow source repo typically, but we will mock it here if rflow doesn't support local external note dumping directly.
        echo "Release $VERSION Generated via ReleaseFlow" > release-notes.md
        
    - name: Sync Version and Build Package
      run: |
        # Update pyproject.toml dynamically
        sed -i "s/^version = \".*\"/version = \"${{ env.VERSION }}\"/" pyproject.toml
        # Update __init__.py dynamically
        sed -i "s/__version__ = \".*\"/__version__ = \"${{ env.VERSION }}\"/" elastro/__init__.py
        
        # Build wheel and sdist
        python -m build

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: Release v${{ env.VERSION }}
        body_path: release-notes.md
        files: |
          security/sbom/*
          security/scans/*
          dist/*

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        python -m twine upload dist/*
