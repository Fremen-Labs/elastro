name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master, feature/**]

jobs:
  test:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run health test suite
        run: |
          pytest tests/unit/health/ tests/integration/test_health_lint.py -q

      - name: LogLoom logging coverage gate (optional)
        run: |
          if command -v logloom >/dev/null 2>&1; then
            logloom lint --min-coverage 80 --paths elastro/health/
          else
            echo "logloom CLI not installed; skipping optional logging coverage gate"
          fi