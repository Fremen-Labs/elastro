name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master, feature/**]

jobs:
  test:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Code quality - Ruff formatter
        run: ruff format --check .

      - name: Code quality - Mypy
        run: mypy .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Security - Dependency and Trivy audit
        run: bash scripts/security-audit.sh

      - name: Security - GUI dev toolchain audit (informational)
        continue-on-error: true
        run: |
          cd packages/gui
          npm audit --audit-level=high

      - name: Run health test suite
        run: |
          pytest tests/unit/health/ tests/integration/test_health_*.py -q

      - name: LogLoom logging coverage gate (optional)
        run: |
          if command -v logloom >/dev/null 2>&1; then
            logloom lint --min-coverage 80 --paths elastro/health/
          else
            echo "logloom CLI not installed; skipping optional logging coverage gate"
          fi